name: Main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  packages: write
  pull-requests: write

jobs:
  validate:
    name: Validate before stable release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build check
        run: npm run docker:build

  stable-release:
    name: Publish stable release
    runs-on: ubuntu-latest
    needs: validate
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip stable release until NPM_TOKEN is configured
        if: env.NPM_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; skipping stable npm/GHCR publish."

      - name: Checkout
        if: env.NPM_TOKEN != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        if: env.NPM_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: env.NPM_TOKEN != ''
        run: npm ci

      - name: Run semantic-release stable
        if: env.NPM_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Read package version
        if: env.NPM_TOKEN != ''
        id: package
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        if: env.NPM_TOKEN != ''
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        if: env.NPM_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: env.NPM_TOKEN != ''
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - name: Build and publish stable Docker image
        if: env.NPM_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sternanchor/blipwatch:latest
            ghcr.io/sternanchor/blipwatch:${{ steps.package.outputs.version }}
