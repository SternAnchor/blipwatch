name: Develop

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate before preview release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build check
        run: npm run docker:build

  preview-release:
    name: Preview release placeholder
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Preview release not configured yet
        run: echo "Preview release publishing is configured in the semantic-release task."
